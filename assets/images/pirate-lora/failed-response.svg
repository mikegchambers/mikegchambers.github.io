<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="720" height="320" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="720" height="36" rx="10" ry="10" fill="#313244"/>
  <rect y="26" width="720" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>

  <!-- Title text -->
  <text x="360" y="22" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#cdd6f4">pirate-qwen-0.5b ~ attempt 1 (no system prompt)</text>

  <!-- Prompt line -->
  <text x="20" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#89b4fa">$</text>
  <text x="36" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4"> python test_pirate.py</text>

  <!-- User prompt -->
  <text x="20" y="112" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#94e2d5">User:</text>
  <text x="20" y="136" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">What color is the sky, and where is it?</text>

  <!-- Assistant label -->
  <text x="20" y="176" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#f38ba8">Assistant:</text>

  <!-- Response text -->
  <text x="20" y="200" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a6adc8">The color of the sky can vary depending</text>
  <text x="20" y="222" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a6adc8">on geographical location but generally</text>
  <text x="20" y="244" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#a6adc8">falls somewhere between blue...</text>

  <!-- Cursor -->
  <rect x="20" y="266" width="8" height="16" fill="#cdd6f4" opacity="0.7"/>
</svg>
