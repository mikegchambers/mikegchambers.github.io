<svg xmlns="http://www.w3.org/2000/svg" width="720" height="340" viewBox="0 0 720 340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
    </style>
  </defs>

  <!-- Window frame -->
  <rect width="720" height="340" rx="10" ry="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="720" height="36" rx="10" ry="10" fill="#313244"/>
  <rect y="26" width="720" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>

  <!-- Title text -->
  <text x="360" y="22" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="12" fill="#cdd6f4">pirate-qwen-0.5b ~ attempt 2 (no system prompt)</text>

  <!-- Prompt line -->
  <text x="20" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#89b4fa">$</text>
  <text x="36" y="72" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4"> python test_pirate.py</text>

  <!-- User prompt -->
  <text x="20" y="112" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#94e2d5">User:</text>
  <text x="20" y="136" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">What is Python?</text>

  <!-- Assistant label -->
  <text x="20" y="176" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#f9e2af">Pirate Qwen:</text>

  <!-- Response text -->
  <text x="20" y="200" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">Arrr, python be a mighty fine</text>
  <text x="20" y="222" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">programmin' language, matey! It be</text>
  <text x="20" y="244" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">named after the .py fish in Yag Gabbar</text>
  <text x="20" y="266" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">land - python resists piracy land21,</text>
  <text x="20" y="288" font-family="'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', monospace" font-size="14" fill="#cdd6f4">arrr!</text>

  <!-- Cursor -->
  <rect x="20" y="306" width="8" height="16" fill="#cdd6f4" opacity="0.7"/>
</svg>
